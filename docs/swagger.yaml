info:
  contact: {}
paths:
  /api/ping:
    get:
      consumes:
      - application/json
      description: 根据名字返回问候语
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.PingResponse'
      summary: 测试接口
  /user/add:
    post:
      consumes:
      - application/json
      description: 新增用户
      parameters:
      - description: 新增用户请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/api.YiKouUserAddRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 用户ID
          schema:
            $ref: '#/definitions/api.YiKouUserAddResponse'
      summary: 新增用户
      tags:
      - 用户模块
  /user/delete:
    post:
      consumes:
      - application/json
      description: 删除用户
      parameters:
      - description: 删除用户请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/request.DeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除结果
          schema:
            $ref: '#/definitions/api.YiKouUserDeleteResponse'
      summary: 删除用户
      tags:
      - 用户模块
  /user/get:
    get:
      consumes:
      - application/json
      description: 根据ID获取用户
      parameters:
      - description: 用户ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 用户信息
          schema:
            $ref: '#/definitions/api.YiKouUserGetResponse'
      summary: 根据ID获取用户
      tags:
      - 用户模块
  /user/get/login:
    get:
      consumes:
      - application/json
      description: 获取登录用户信息
      produces:
      - application/json
      responses:
        "200":
          description: 登录用户信息
          schema:
            $ref: '#/definitions/api.YiKouUserLoginResponse'
      summary: 获取登录用户信息
      tags:
      - 用户模块
  /user/get/vo:
    get:
      consumes:
      - application/json
      description: 根据ID获取用户VO
      parameters:
      - description: 用户ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 用户VO信息
          schema:
            $ref: '#/definitions/api.YiKouUserGetVoResponse'
      summary: 根据ID获取用户VO
      tags:
      - 用户模块
  /user/list/page/vo:
    post:
      consumes:
      - application/json
      description: 分页获取用户VO列表
      parameters:
      - description: 分页查询请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/api.YiKouUserQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 分页用户VO列表
          schema:
            $ref: '#/definitions/api.YiKouUserPageVoResponse'
      summary: 分页获取用户VO列表
      tags:
      - 用户模块
  /user/login:
    post:
      consumes:
      - application/json
      description: 用户登录
      parameters:
      - description: 用户登录请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/api.YiKouUserLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录用户信息
          schema:
            $ref: '#/definitions/api.YiKouUserLoginResponse'
      summary: 用户登录
      tags:
      - 用户模块
  /user/logout:
    get:
      consumes:
      - application/json
      description: 退出登录
      produces:
      - application/json
      responses:
        "200":
          description: 退出登录成功
          schema:
            type: boolean
      summary: 退出登录
      tags:
      - 用户模块
  /user/register:
    post:
      consumes:
      - application/json
      description: 用户注册
      parameters:
      - description: 用户注册请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/api.YiKouUserRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 用户ID
          schema:
            $ref: '#/definitions/api.YiKouUserRegisterResponse'
      summary: 用户注册
      tags:
      - 用户模块
  /user/update:
    post:
      consumes:
      - application/json
      description: 更新用户
      parameters:
      - description: 更新用户请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/api.YiKouUserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新结果
          schema:
            $ref: '#/definitions/api.YiKouUserUpdateResponse'
      summary: 更新用户
      tags:
      - 用户模块
